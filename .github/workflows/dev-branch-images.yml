name: Docker Dev Branch Images Build

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - 'api/**'
      - 'client/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'Dockerfile.multi'

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 130
    strategy:
      matrix:
        include:
          - target: api-build
            file: Dockerfile.multi
            image_name: lc-arcadyan-dev-api
          - target: node
            file: Dockerfile
            image_name: lc-arcadyan-dev

    steps:
      # Check out the repository
      - name: Checkout
        uses: actions/checkout@v4

      # Set up QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Login to Docker Hub (disabled: no DOCKERHUB secrets on fork)
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Prepare the environment
      - name: Prepare environment
        run: |
          cp .env.example .env

      - name: Compute build metadata
        run: |
          echo "BUILD_COMMIT=${{ github.sha }}" >> $GITHUB_ENV
          echo "BUILD_BRANCH=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      # Build and push Docker images for each target
      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          # Docker Hub tags disabled (no DOCKERHUB secrets on fork)
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:latest
          platforms: linux/amd64,linux/arm64
          target: ${{ matrix.target }}
          build-args: |
            BUILD_COMMIT=${{ env.BUILD_COMMIT }}
            BUILD_BRANCH=${{ env.BUILD_BRANCH }}
            BUILD_DATE=${{ env.BUILD_DATE }}

      # Export a single-arch (amd64) image as a loadable docker-archive tarball
      - name: Export image tarball
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64
          target: ${{ matrix.target }}
          tags: ${{ matrix.image_name }}:${{ github.sha }}
          outputs: type=docker,dest=${{ github.workspace }}/${{ matrix.image_name }}.tar
          build-args: |
            BUILD_COMMIT=${{ env.BUILD_COMMIT }}
            BUILD_BRANCH=${{ env.BUILD_BRANCH }}
            BUILD_DATE=${{ env.BUILD_DATE }}

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image_name }}-image
          path: ${{ github.workspace }}/${{ matrix.image_name }}.tar
          if-no-files-found: error
          retention-days: 7
